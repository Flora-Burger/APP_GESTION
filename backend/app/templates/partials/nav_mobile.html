<nav class="nav-mobile" aria-label="{{ t.nav_mobile }}">
    <ul class="nav-mobile-liste">
        <li class="nav-mobile-item">
            <a href="/" class="nav-mobile-lien{% if request.url.path == '/' %} actif{% endif %}">
                <svg class="nav-mobile-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                    <path d="M4 10.5 12 4l8 6.5"/>
                    <path d="M6 9.5V20h12V9.5"/>
                </svg>
                <span class="nav-mobile-libelle">{{ t.accueil }}</span>
            </a>
        </li>
        {% for module in modules_navigation %}
        <li class="nav-mobile-item">
            <a
                href="{{ module.route_web }}"
                class="nav-mobile-lien{% if request.url.path == module.route_web or request.url.path.startswith(module.route_web ~ '/') %} actif{% endif %}"
            >
                {% with module_id=module.id %}
                {% include "partials/icone_module.html" %}
                {% endwith %}
                <span class="nav-mobile-libelle">{{ module.libelle_es }}</span>
            </a>
        </li>
        {% endfor %}
    </ul>
</nav>

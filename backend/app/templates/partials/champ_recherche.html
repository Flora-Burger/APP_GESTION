<div class="groupe-filtre groupe-recherche">
    <label for="{{ recherche_id }}">{{ t.recherche }}</label>
    <input
        type="search"
        id="{{ recherche_id }}"
        name="{{ recherche_name }}"
        class="champ-recherche"
        placeholder="{{ recherche_placeholder }}"
        value="{{ recherche_valeur }}"
        autocomplete="off"
        aria-label="{{ t.recherche }}"
    >
</div>
